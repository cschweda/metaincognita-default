<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- metaincognita hub og-image — Metaincognita branded background system (guidelines §6/§8):
       navy diagonal gradient, fine + major grids, dot overlay, vignette, corner registration
       marks, accent (gold) title with glow, mono stat chips, a card-suits content layer, and
       the bottom METAINCOGNITA rule. textPath-free so librsvg (rsvg-convert) matches the SVG. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0c1a"/>
      <stop offset="1" stop-color="#060810"/>
    </linearGradient>
    <pattern id="grid-fine" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1e2848" stroke-width="0.6" opacity="0.75"/>
    </pattern>
    <pattern id="grid-major" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#283458" stroke-width="1.2"/>
    </pattern>
    <pattern id="dots" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="1.6" fill="#33457a"/>
    </pattern>
    <radialGradient id="vignette" cx="0.5" cy="0.45" r="0.78">
      <stop offset="0.5" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.58"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background stack -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid-fine)"/>
  <rect width="1200" height="630" fill="url(#grid-major)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- ============ content layer: a hand of card suits (the suite) ============ -->
  <g font-family="Arial, 'Helvetica Neue', sans-serif">
    <!-- spade (gold) -->
    <g>
      <rect x="760" y="132" width="148" height="186" rx="12" fill="#0e1428" stroke="#d4a847" stroke-opacity="0.4" stroke-width="1.5"/>
      <text x="776" y="166" font-size="24" font-weight="700" fill="#d4a847">A</text>
      <text x="777" y="188" font-size="17" fill="#d4a847">&#9824;</text>
      <text x="834" y="258" font-size="86" fill="#d4a847" text-anchor="middle">&#9824;</text>
    </g>
    <!-- heart (red) -->
    <g>
      <rect x="928" y="132" width="148" height="186" rx="12" fill="#0e1428" stroke="#e23744" stroke-opacity="0.4" stroke-width="1.5"/>
      <text x="944" y="166" font-size="24" font-weight="700" fill="#e23744">K</text>
      <text x="945" y="188" font-size="17" fill="#e23744">&#9829;</text>
      <text x="1002" y="258" font-size="86" fill="#e23744" text-anchor="middle">&#9829;</text>
    </g>
    <!-- diamond (red) -->
    <g>
      <rect x="760" y="332" width="148" height="186" rx="12" fill="#0e1428" stroke="#e23744" stroke-opacity="0.4" stroke-width="1.5"/>
      <text x="776" y="366" font-size="24" font-weight="700" fill="#e23744">Q</text>
      <text x="777" y="388" font-size="17" fill="#e23744">&#9830;</text>
      <text x="834" y="458" font-size="86" fill="#e23744" text-anchor="middle">&#9830;</text>
    </g>
    <!-- club (gold) -->
    <g>
      <rect x="928" y="332" width="148" height="186" rx="12" fill="#0e1428" stroke="#d4a847" stroke-opacity="0.4" stroke-width="1.5"/>
      <text x="944" y="366" font-size="24" font-weight="700" fill="#d4a847">J</text>
      <text x="945" y="388" font-size="17" fill="#d4a847">&#9827;</text>
      <text x="1002" y="458" font-size="86" fill="#d4a847" text-anchor="middle">&#9827;</text>
    </g>
  </g>

  <!-- ============ title block (left) ============ -->
  <text x="64" y="232" font-family="'Helvetica Neue', Arial, sans-serif" font-size="78" font-weight="800" letter-spacing="-2" filter="url(#glow)"><tspan fill="#f5f0e1">meta</tspan><tspan fill="#d4a847">incognita</tspan></text>
  <text x="66" y="284" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="600" letter-spacing="7" fill="#f5f0e1">CASINO SIMULATION SUITE</text>
  <text x="66" y="332" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#9aa6c2">Casino games rebuilt as honest, open-source simulations</text>
  <text x="66" y="362" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#9aa6c2">that reveal the math the floor never shows.</text>

  <!-- stat chips -->
  <g font-family="'Fira Code', Menlo, monospace" font-size="15">
    <rect x="64" y="390" width="151" height="34" rx="8" fill="#10182e" stroke="#d4a847" stroke-opacity="0.6"/>
    <text x="77" y="413" fill="#d4a847">8 SIMULATIONS</text>
    <rect x="229" y="390" width="84" height="34" rx="8" fill="#10182e" stroke="#f5f0e1" stroke-opacity="0.6"/>
    <text x="242" y="413" fill="#f5f0e1">1 TOOL</text>
    <rect x="327" y="390" width="132" height="34" rx="8" fill="#10182e" stroke="#7ee0a6" stroke-opacity="0.6"/>
    <text x="340" y="413" fill="#7ee0a6">OPEN SOURCE</text>
  </g>

  <!-- corner registration marks -->
  <g stroke="#3a4570" stroke-width="2" fill="none">
    <path d="M 24 44 L 24 24 L 44 24"/>
    <path d="M 1156 24 L 1176 24 L 1176 44"/>
    <path d="M 1176 586 L 1176 606 L 1156 606"/>
    <path d="M 44 606 L 24 606 L 24 586"/>
  </g>

  <!-- bottom branding -->
  <rect x="64" y="594" width="120" height="4" fill="#d4a847"/>
  <line x1="0" y1="600" x2="1200" y2="600" stroke="#1e2848" stroke-width="1"/>
  <text x="64" y="621" font-family="'Fira Code', Menlo, monospace" font-size="13" fill="#3a4570" letter-spacing="6">METAINCOGNITA.COM</text>
  <text x="1136" y="621" font-family="'Fira Code', Menlo, monospace" font-size="13" fill="#3a4570" letter-spacing="2" text-anchor="end">GITHUB.COM/CSCHWEDA</text>
</svg>
